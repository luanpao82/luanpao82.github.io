name: Update Dashboard Data

on:
  schedule:
    - cron: '0 4 * * *'   # 00:00 EDT (04:00 UTC) — shifts ±1h with DST; adjust if needed
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update primary projects in dashboard.html
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PYEOF'
          import json
          import re
          import subprocess
          import sys

          # Surgical update: replace ONLY the auto-update block in PROJECTS, leaving
          # `primary: true` flags and the manually-curated "Other Projects" intact.
          REPOS = [
              {"key": "asian-nonprofit-research",    "name": "Asian Nonprofit Research",    "tag": "Text Analysis · Asia",         "url": "https://luanpao82.github.io/asian-nonprofit-research/index.html"},
              {"key": "coc-criminalization",         "name": "Anti-criminalization by CoC", "tag": "Multilevel DiD · Homelessness","url": "https://luanpao82.github.io/coc-criminalization/"},
              {"key": "arnova-history",              "name": "ARNOVA History Database",     "tag": "Longitudinal Data · ARNOVA",   "url": "https://luanpao82.github.io/arnova-history/"},
              {"key": "immigration-policy-nonprofit","name": "Policy Signals & Revenue",    "tag": "Signaling Theory · Nonprofit", "url": "https://luanpao82.github.io/immigration-policy-nonprofit/"},
              {"key": "state-immigration-policy",    "name": "State Immigration Policy",    "tag": "Policy Analysis · Immigration","url": "https://luanpao82.github.io/state-immigration-policy/"},
          ]

          # Strict-safe escape for content embedded in single-quoted JS strings.
          # Order matters: backslash first.
          def js_escape(s):
              return (
                  s.replace("\\", "\\\\")
                   .replace("'", "\\'")
                   .replace("\r", "")
                   .replace("\n", " ")
                   .replace("<", "\\x3c")  # neutralize </script> in commit messages
                   .replace(">", "\\x3e")
              )

          def fetch_commits(key):
              try:
                  r = subprocess.run(
                      ["gh", "api", f"repos/luanpao82/{key}/commits?per_page=30",
                       "--jq", '[.[] | {date: .commit.author.date[0:10], msg: .commit.message | split("\\n")[0][0:80]}]'],
                      capture_output=True, text=True, timeout=30,
                  )
                  if r.returncode != 0 or not r.stdout.strip():
                      print(f"[warn] gh api failed for {key}: {r.stderr.strip()[:200]}", file=sys.stderr)
                      return None
                  return json.loads(r.stdout)
              except Exception as e:
                  print(f"[warn] fetch_commits({key}) raised: {e}", file=sys.stderr)
                  return None

          blocks = []
          fetched_any = False
          for r in REPOS:
              commits = fetch_commits(r["key"])
              if commits is None:
                  # Bail out entirely — better to keep yesterday's data than to half-update.
                  print(f"[abort] could not fetch commits for {r['key']}", file=sys.stderr)
                  sys.exit(0)
              fetched_any = fetched_any or len(commits) > 0
              commit_lines = ",\n".join(
                  f"        {{ date: '{c['date']}', msg: '{js_escape(c['msg'])}' }}"
                  for c in commits
              )
              blocks.append(
                  "    {\n"
                  f"      name: '{js_escape(r['name'])}',\n"
                  f"      tag: '{js_escape(r['tag'])}',\n"
                  f"      primary: true,\n"
                  f"      url: '{js_escape(r['url'])}',\n"
                  "      commits: [\n"
                  f"{commit_lines}\n"
                  "      ]\n"
                  "    }"
              )

          if not fetched_any:
              print("[abort] no commits returned from any repo; leaving dashboard untouched", file=sys.stderr)
              sys.exit(0)

          marker_start = "// >>> AUTO_UPDATE_START"
          marker_end = "// <<< AUTO_UPDATE_END"
          replacement = (
              marker_start + " — auto-updated by .github/workflows/update-dashboard.yml; do not edit between markers\n"
              + ",\n".join(blocks)
              + ",\n    "
              + marker_end
          )

          with open("dashboard.html", "r") as f:
              html = f.read()

          pattern = re.compile(re.escape(marker_start) + r".*?" + re.escape(marker_end), re.DOTALL)
          if not pattern.search(html):
              print("[abort] auto-update markers not found in dashboard.html", file=sys.stderr)
              sys.exit(1)

          new_html = pattern.sub(lambda _m: replacement, html, count=1)
          if new_html == html:
              print("No data changes")
          else:
              with open("dashboard.html", "w") as f:
                  f.write(new_html)
              print(f"Updated {len(REPOS)} primary projects")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update dashboard data ($(date -u +%Y-%m-%d))"
            git push
          fi
