name: Update Dashboard Data

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 6:00 UTC (1:00 AM EST)
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch commit data and update dashboard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          REPOS="asian-nonprofit-research coc-criminalization arnova-history state-immigration-policy immigration-policy-nonprofit"
          TODAY=$(date -u +%Y-%m-%d)

          # Fetch commits (last 30) from each repo as JSON
          ALL_DATA="["
          first=true
          for repo in $REPOS; do
            DATA=$(gh api "repos/luanpao82/$repo/commits?per_page=30" \
              --jq "[.[] | {date: .commit.author.date[0:10], msg: .commit.message | split(\"\n\")[0][0:80]}]" 2>/dev/null || echo "[]")

            # Get repo metadata
            case "$repo" in
              asian-nonprofit-research)
                NAME="Asian Nonprofit Research"
                TAG="Text Analysis · Asia"
                URL="https://luanpao82.github.io/asian-nonprofit-research/index.html" ;;
              coc-criminalization)
                NAME="Anti-criminalization by CoC"
                TAG="Multilevel DiD · Homelessness"
                URL="https://luanpao82.github.io/coc-criminalization/" ;;
              arnova-history)
                NAME="ARNOVA History Database"
                TAG="Longitudinal Data · ARNOVA"
                URL="https://luanpao82.github.io/arnova-history/" ;;
              state-immigration-policy)
                NAME="State Immigration Policy"
                TAG="Policy Analysis · Immigration"
                URL="https://luanpao82.github.io/state-immigration-policy/" ;;
              immigration-policy-nonprofit)
                NAME="Policy Signals & Revenue"
                TAG="Signaling Theory · Nonprofit"
                URL="https://luanpao82.github.io/immigration-policy-nonprofit/" ;;
            esac

            COMMITS_JS=$(echo "$DATA" | python3 -c "
          import json, sys
          commits = json.load(sys.stdin)
          lines = []
          for c in commits:
              msg = c['msg'].replace(\"'\", \"\\\\'\").replace('\"', '\\\\\"')
              lines.append(f\"        {{ date: '{c['date']}', msg: '{msg}' }}\")
          print(',\n'.join(lines))
          ")

            if [ "$first" = true ]; then first=false; else ALL_DATA+=","; fi
            ALL_DATA+="
              {
                \"name\": \"$NAME\",
                \"tag\": \"$TAG\",
                \"url\": \"$URL\",
                \"commits\": \"$COMMITS_JS\"
              }"
          done
          ALL_DATA+="]"

          # Build the JS PROJECTS block
          python3 << 'PYEOF'
          import json, re

          repos = [
            {
              "key": "asian-nonprofit-research",
              "name": "Asian Nonprofit Research",
              "tag": "Text Analysis · Asia",
              "url": "https://luanpao82.github.io/asian-nonprofit-research/index.html"
            },
            {
              "key": "coc-criminalization",
              "name": "Anti-criminalization by CoC",
              "tag": "Multilevel DiD · Homelessness",
              "url": "https://luanpao82.github.io/coc-criminalization/"
            },
            {
              "key": "arnova-history",
              "name": "ARNOVA History Database",
              "tag": "Longitudinal Data · ARNOVA",
              "url": "https://luanpao82.github.io/arnova-history/"
            },
            {
              "key": "immigration-policy-nonprofit",
              "name": "Policy Signals & Revenue",
              "tag": "Signaling Theory · Nonprofit",
              "url": "https://luanpao82.github.io/immigration-policy-nonprofit/"
            },
            {
              "key": "state-immigration-policy",
              "name": "State Immigration Policy",
              "tag": "Policy Analysis · Immigration",
              "url": "https://luanpao82.github.io/state-immigration-policy/"
            },
          ]

          import subprocess
          projects_js = []
          for r in repos:
              result = subprocess.run(
                  ["gh", "api", f"repos/luanpao82/{r['key']}/commits?per_page=30",
                   "--jq", '[.[] | {date: .commit.author.date[0:10], msg: .commit.message | split("\\n")[0][0:80]}]'],
                  capture_output=True, text=True
              )
              commits = json.loads(result.stdout) if result.returncode == 0 else []

              commit_lines = []
              for c in commits:
                  msg = c["msg"].replace("\\", "\\\\").replace("'", "\\'")
                  commit_lines.append(f"        {{ date: '{c['date']}', msg: '{msg}' }}")

              projects_js.append(f"""    {{
                name: '{r["name"]}',
                tag: '{r["tag"]}',
                url: '{r["url"]}',
                commits: [
          {chr(10).join(commit_lines)}{(',' if commit_lines else '')}
                ]
              }}""")

          new_block = "  const PROJECTS = [\n" + ",\n".join(projects_js) + "\n  ];"

          # Read dashboard.html
          with open("dashboard.html", "r") as f:
              html = f.read()

          # Replace the PROJECTS block
          pattern = r"  const PROJECTS = \[[\s\S]*?\n  \];"
          html = re.sub(pattern, new_block, html, count=1)

          with open("dashboard.html", "w") as f:
              f.write(html)

          print(f"Updated {len(repos)} projects")
          PYEOF

      - name: Commit and push if changed
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update dashboard data ($(date -u +%Y-%m-%d))"
            git push
          fi
