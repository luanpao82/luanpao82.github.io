<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Dashboard</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --border: rgba(0, 200, 255, 0.12);
      --border-bright: rgba(0, 200, 255, 0.3);
      --text: #f0f4f8;
      --text-dim: #8a9bb5;
      --cyan: #00c8ff;
      --cyan-glow: rgba(0, 200, 255, 0.4);
      --font: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Helvetica, Arial, sans-serif;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── LOCK SCREEN ── */
    #lock-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
    }

    #lock-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(0,200,255,0.03) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,200,255,0.015) 2px, rgba(0,200,255,0.015) 4px);
      pointer-events: none;
    }

    .lock-box {
      text-align: center;
      max-width: 380px;
      padding: 48px 32px;
      position: relative;
      z-index: 1;
    }

    .lock-arc {
      width: 100px;
      height: 100px;
      margin: 0 auto 32px;
      position: relative;
    }

    .lock-arc svg { width: 100%; height: 100%; animation: arc-spin 4s linear infinite; }

    @keyframes arc-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .lock-arc .arc-center {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan-glow);
    }

    .lock-box h1 {
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan-glow);
      margin-bottom: 4px;
    }

    .lock-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 28px; }

    .lock-input {
      width: 100%;
      padding: 14px 20px;
      background: rgba(0,200,255,0.04);
      border: 1px solid var(--border-bright);
      border-radius: 8px;
      font-size: 18px;
      font-family: var(--font);
      color: var(--cyan);
      text-align: center;
      letter-spacing: 0.3em;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      -webkit-text-security: disc;
    }

    .lock-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 20px var(--cyan-glow), inset 0 0 20px rgba(0,200,255,0.05);
    }

    .lock-input.shake {
      animation: shake 0.4s ease;
      border-color: #ff3b30;
      box-shadow: 0 0 20px rgba(255,59,48,0.3);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .lock-btn {
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      border: 1px solid var(--border-bright);
      border-radius: 8px;
      background: rgba(0,200,255,0.08);
      color: var(--cyan);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
    }

    .lock-btn:hover {
      background: rgba(0,200,255,0.15);
      box-shadow: 0 0 30px var(--cyan-glow);
    }

    /* ── BOOT ── */
    #boot-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .boot-text {
      font-family: var(--font);
      font-size: 13px;
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan-glow);
      opacity: 0;
      transform: translateY(8px);
    }

    .boot-text.show {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.3s ease;
    }

    /* ── DASHBOARD ── */
    #dashboard {
      display: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #dashboard.visible { opacity: 1; }

    /* ── HEADER ── */
    .dash-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 14, 23, 0.7);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      border-bottom: 1px solid rgba(0,200,255,0.08);
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
      padding: 16px 24px;
    }

    .dash-header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .dash-logo { display: flex; align-items: center; gap: 12px; }

    .dash-logo-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: rgba(0,200,255,0.1);
      border: 1px solid var(--border-bright);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cyan);
      font-size: 14px;
    }

    .dash-logo h1 {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 15px var(--cyan-glow);
    }

    .dash-header-right { display: flex; align-items: center; gap: 20px; }

    .dash-time { font-family: var(--font); font-size: 12px; color: var(--text-dim); }

    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .dash-back {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.25s;
    }

    .dash-back:hover { color: var(--cyan); border-color: var(--border-bright); text-decoration: none; }

    /* ── CONTENT ── */
    .dash-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    /* ── SECTION PANEL (glassmorphism) ── */
    .section-panel {
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0,200,255,0.08);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .section-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,200,255,0.3), transparent);
    }

    .section-panel h2 {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 15px rgba(0,200,255,0.4);
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-panel h2 .h2-count {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-shadow: none;
    }

    .section-panel h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(0,200,255,0.2), transparent);
    }

    /* ── PANEL ANIMATION ── */
    .panel-reveal {
      opacity: 0;
      transform: translateY(20px);
    }

    .panel-reveal.entered {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── PROJECT CARDS ── */
    .proj-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .proj-card {
      background: linear-gradient(135deg, rgba(0,200,255,0.04) 0%, rgba(0,100,180,0.02) 100%);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0,200,255,0.1);
      border-radius: 14px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: all 0.35s ease;
    }

    .proj-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,200,255, var(--glow-level, 0.2)), rgba(0,230,255, var(--glow-level, 0.2)), transparent);
      transition: opacity 0.3s;
    }

    .proj-card::after {
      content: '';
      position: absolute;
      top: 12px; left: 0; bottom: 12px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: linear-gradient(180deg, rgba(0,200,255,0.5), rgba(0,200,255,0.1));
      opacity: var(--glow-level, 0.2);
      box-shadow: 0 0 10px rgba(0,200,255, var(--glow-level, 0.2));
    }

    .proj-card:hover {
      border-color: rgba(0,200,255,0.25);
      box-shadow: 0 4px 30px rgba(0,200,255,0.08), 0 0 1px rgba(0,200,255,0.3);
      transform: translateY(-3px);
      background: linear-gradient(135deg, rgba(0,200,255,0.06) 0%, rgba(0,100,180,0.03) 100%);
    }

    .proj-card:hover::after { opacity: 0.7; }

    .proj-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .proj-card-name { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
    .proj-card-name a { color: #fff; text-decoration: none; transition: all 0.2s; }
    .proj-card-name a:hover { color: var(--cyan); text-shadow: 0 0 12px var(--cyan-glow); }

    .proj-card-tag {
      font-family: var(--font);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Donut ring chart ── */
    .commit-ring { width: 52px; height: 52px; flex-shrink: 0; position: relative; }
    .commit-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .commit-ring .ring-bg { fill: none; stroke: rgba(0,200,255,0.06); stroke-width: 4; }

    .commit-ring .ring-fill {
      fill: none;
      stroke: url(#ring-gradient);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 100.5;
      stroke-dashoffset: 100.5;
      transition: stroke-dashoffset 1.5s cubic-bezier(0.16, 1, 0.3, 1);
      filter: drop-shadow(0 0 4px rgba(0,200,255,0.5));
    }

    .commit-ring .ring-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 8px rgba(0,200,255,0.3);
    }

    /* ── Commit lines ── */
    .proj-card-commits {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 12px;
      border-top: 1px solid rgba(0,200,255,0.05);
    }

    .proj-card-commit { font-size: 13px; color: var(--text-dim); line-height: 1.7; display: flex; gap: 10px; align-items: baseline; }
    .pcc-date { font-family: var(--font); font-size: 10px; color: rgba(0,200,255,0.5); white-space: nowrap; flex-shrink: 0; }
    .pcc-msg { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── JARVIS STATUS BAR ── */
    .jarvis-status {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: rgba(17, 24, 39, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0,200,255,0.08);
      border-radius: 12px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,200,255,0.2), transparent);
    }

    .stat-label {
      font-family: var(--font);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: var(--font);
      font-size: 28px;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 20px rgba(0,200,255,0.3);
      line-height: 1;
    }

    .stat-sub {
      font-family: var(--font);
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 6px;
      letter-spacing: 0.03em;
    }

    .stat-value.stat-online {
      color: #34d399;
      text-shadow: 0 0 20px rgba(52,211,153,0.3);
    }

    /* ── JARVIS BANNER ── */
    .jarvis-banner {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      padding: 20px 24px;
      background: linear-gradient(135deg, rgba(0,200,255,0.06) 0%, rgba(0,100,180,0.03) 100%);
      border: 1px solid rgba(0,200,255,0.1);
      border-radius: 14px;
      position: relative;
      overflow: hidden;
    }

    .jarvis-banner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,200,255,0.3), transparent);
    }

    .jarvis-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0,200,255,0.08);
      border: 2px solid rgba(0,200,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--cyan);
      flex-shrink: 0;
      animation: avatar-pulse 3s ease-in-out infinite;
      box-shadow: 0 0 15px rgba(0,200,255,0.15);
    }

    @keyframes avatar-pulse {
      0%, 100% { box-shadow: 0 0 15px rgba(0,200,255,0.15); border-color: rgba(0,200,255,0.25); }
      50% { box-shadow: 0 0 25px rgba(0,200,255,0.25); border-color: rgba(0,200,255,0.4); }
    }

    .jarvis-msg {
      flex: 1;
    }

    .jarvis-msg-name {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 10px rgba(0,200,255,0.3);
      margin-bottom: 4px;
    }

    .jarvis-msg-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
    }

    .jarvis-msg-text .highlight {
      color: var(--cyan);
      font-weight: 600;
    }

    /* ── JARVIS BRIEFING ── */
    /* Stage wraps the circular HUD and the external soundbar */
    .briefing-stage {
      position: relative;
      width: min(740px, 96vw);
      margin: 0 auto 28px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ── J.A.R.V.I.S. HUD PANEL (circular) ── */
    .briefing-panel {
      width: min(580px, 86vw);
      aspect-ratio: 1;
      padding: 0;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 50% 50%,
          rgba(0,40,75,0.55) 0%,
          rgba(8,18,38,0.92) 60%,
          rgba(3,8,18,0.98) 100%);
      border: 1.5px solid rgba(0,200,255,0.42);
      box-shadow:
        0 0 80px rgba(0,200,255,0.18),
        0 0 140px rgba(180,90,255,0.08),
        inset 0 0 120px rgba(0,200,255,0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Hexagon grid texture (faint, behind everything) */
    .briefing-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(60deg, rgba(0,200,255,0.04) 25%, transparent 25.5%, transparent 75%, rgba(0,200,255,0.04) 75.5%),
        linear-gradient(-60deg, rgba(0,200,255,0.04) 25%, transparent 25.5%, transparent 75%, rgba(0,200,255,0.04) 75.5%);
      background-size: 18px 31.18px;
      mix-blend-mode: screen;
      pointer-events: none;
      opacity: 0.7;
      mask-image: radial-gradient(circle at center, black 0%, black 60%, transparent 95%);
      -webkit-mask-image: radial-gradient(circle at center, black 0%, black 60%, transparent 95%);
    }

    /* Horizontal scan-line sweep */
    .briefing-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent 0,
          transparent 3px,
          rgba(0,200,255,0.05) 3px,
          rgba(0,200,255,0.05) 4px
        );
      pointer-events: none;
      mix-blend-mode: screen;
    }

    /* SVG HUD overlay (rings, tick marks, rotating arcs) */
    .hud-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .hud-arc-1 { transform-origin: 50px 50px; animation: hud-spin 14s linear infinite; }
    .hud-arc-2 { transform-origin: 50px 50px; animation: hud-spin 11s linear infinite reverse; }
    .hud-arc-3 { transform-origin: 50px 50px; animation: hud-spin 22s linear infinite; }
    @keyframes hud-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .hud-sweep {
      transform-origin: 50px 50px;
      animation: hud-sweep-rotate 6s linear infinite;
      opacity: 0.55;
      mix-blend-mode: screen;
    }
    @keyframes hud-sweep-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .hud-corner-text {
      position: absolute;
      font-family: var(--font);
      font-size: 9px;
      letter-spacing: 0.18em;
      color: rgba(0,230,255,0.55);
      text-transform: uppercase;
      pointer-events: none;
      z-index: 3;
    }
    .hud-corner-tl { top: 12%; left: 14%; }
    .hud-corner-tr { top: 12%; right: 14%; text-align: right; }
    .hud-corner-bl { bottom: 12%; left: 14%; }
    .hud-corner-br { bottom: 12%; right: 14%; text-align: right; }

    .hud-corner-text .hcv {
      color: #fff;
      text-shadow: 0 0 8px rgba(0,200,255,0.6);
      font-weight: 600;
    }

    .briefing-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      position: relative;
      z-index: 3;
    }

    /* ── JARVIS ORB (voice visualization) ── */
    .jarvis-orb {
      position: relative;
      width: 180px;
      height: 180px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .orb-core {
      width: 116px;
      height: 116px;
      border-radius: 50%;
      margin-top: 18px;
      background:
        /* Specular hot-spot */
        radial-gradient(circle at 32% 26%,
          rgba(255,255,255,0.95) 0%,
          rgba(255,210,245,0.55) 14%,
          rgba(255,255,255,0) 32%),
        /* Magenta accent */
        radial-gradient(circle at 78% 70%,
          rgba(255,90,180,0.7) 0%,
          rgba(255,90,180,0) 45%),
        /* Violet mid-tone */
        radial-gradient(circle at 30% 80%,
          rgba(150,90,255,0.6) 0%,
          rgba(150,90,255,0) 50%),
        /* Teal/aqua highlight */
        radial-gradient(circle at 70% 35%,
          rgba(0,255,220,0.55) 0%,
          rgba(0,255,220,0) 45%),
        /* Base sphere */
        radial-gradient(circle at 50% 55%,
          rgba(0,210,255,0.85) 0%,
          rgba(80,60,220,0.65) 55%,
          rgba(30,20,90,0.55) 100%);
      box-shadow:
        0 0 32px rgba(0,200,255,0.5),
        0 0 60px rgba(190,90,255,0.3),
        0 0 90px rgba(255,90,180,0.18);
      transform: scale(1);
      transition: box-shadow 0.12s ease, filter 0.12s ease;
      will-change: transform, box-shadow, filter;
      filter: brightness(1) saturate(1.1);
    }

    /* Voice-pulse ripple — flares on each syllable peak */

      top: 18px;
      left: 50%;
      width: 116px;
      height: 116px;

      opacity: 0;
      transform: scale(1);
      pointer-events: none;
      will-change: transform, opacity;
    }
    .orb-pulse.flare {
      animation: orb-pulse-flare 760ms cubic-bezier(0.215, 0.61, 0.355, 1);
    }
    @keyframes orb-pulse-flare {
      0%   { opacity: 0.75; transform: scale(1);    border-width: 2px; border-color: rgba(0,230,255,0.75); }
      50%  { border-color: rgba(180,140,255,0.55); }
      100% { opacity: 0;    transform: scale(1.95); border-width: 0.5px; border-color: rgba(255,120,200,0.2); }
    }

    .orb-ring {
      position: absolute;
      top: 18px;
      left: 50%;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.25;
      transition: opacity 0.5s ease;
      border-style: solid;
      border-width: 1px;
    }

    .orb-ring-1 {
      width: 138px;
      height: 138px;
      margin-left: -69px;
      margin-top: -11px;
      border-color: transparent;
      border-top-color: rgba(0,230,255,0.75);
      border-right-color: rgba(180,140,255,0.4);
      border-left-color: rgba(255,120,200,0.5);
      animation: orb-ring-spin 12s linear infinite;
    }

    @keyframes orb-ring-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .jarvis-orb.speaking .orb-ring,
    .jarvis-orb.listening .orb-ring {

    .jarvis-orb.idle .orb-core {
      animation: orb-breathe 2.6s ease-in-out infinite;
    }

    .briefing-title-block {

    .briefing-title {
      font-family: var(--font);
      font-size: 13px;

      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 15px rgba(0,200,255,0.4);
    }

    .briefing-subtitle {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Briefing controls (mute / captions) — inside upper area of circular panel */
    .briefing-controls {
      position: absolute;
      top: 13%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 4;
    }

    .brf-btn {
      background: rgba(0,200,255,0.06);

      justify-content: center;

      border-color: rgba(0,200,255,0.45);

    /* Data-reactive card highlight */
    .jarvis-highlight {
      outline: 2px solid var(--cyan);
      outline-offset: 4px;
      box-shadow: 0 0 32px rgba(0,200,255,0.55);
      transform: scale(1.02);
      transition:
        transform 600ms cubic-bezier(0.215, 0.61, 0.355, 1),
        box-shadow 600ms cubic-bezier(0.215, 0.61, 0.355, 1),
        outline-color 600ms cubic-bezier(0.215, 0.61, 0.355, 1);
    }

    /* Briefing text area — centered narrow column to fit inside circle */
    .briefing-body {
      min-height: 72px;
      text-align: center;
      max-width: 320px;
      margin: 0 auto;
      padding: 0 8px;
      position: relative;
      z-index: 3;
    }

    .briefing-line {
      font-size: 15px;
      color: var(--text);
      line-height: 1.85;
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.55s ease, transform 0.55s ease,
                  font-size 0.5s ease, filter 0.5s ease, color 0.4s ease;
      filter: blur(0);
    }

    .briefing-line.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .briefing-line.active {
      font-size: 17px;
      color: #fff;
      text-shadow: 0 0 18px rgba(0,200,255,0.32),
                   0 0 28px rgba(180,140,255,0.22);
    }

    .briefing-line.past {
      opacity: 0.4;
      font-size: 13px;
      filter: blur(0.4px);
    }

    /* Per-word reveal */
    .briefing-line .bw {
      display: inline-block;
      opacity: 0;
      transform: translateY(8px) scale(0.96);
      filter: blur(4px);
      transition:
        opacity 320ms cubic-bezier(0.215, 0.61, 0.355, 1),
        transform 320ms cubic-bezier(0.215, 0.61, 0.355, 1),
        filter 320ms cubic-bezier(0.215, 0.61, 0.355, 1),
        color 220ms ease;
    }

    .briefing-line .bw.spoken {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    .briefing-line .bw.active {
      background: linear-gradient(120deg, #00e6ff 0%, #b496ff 50%, #ff66c4 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 14px rgba(180,140,255,0.55);
      transform: translateY(-1px) scale(1.04);
    }

    .briefing-line .bl-project {
      color: var(--cyan);
      font-weight: 600;
    }

    .briefing-line .bl-num {
      color: #34d399;
      font-weight: 700;
      font-family: var(--font);
    }

    .briefing-line .bl-date {
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 12px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .proj-grid { grid-template-columns: 1fr; }
      .jarvis-status { grid-template-columns: repeat(2, 1fr); }
      .dash-time { display: none; }

      /* Stack the soundbar below the circular HUD */
      .briefing-stage {
        flex-direction: column;
        gap: 14px;
        width: 96vw;
      }
      .briefing-panel { width: min(440px, 92vw); }
      .orb-bars {
        position: static;
        transform: none;
        width: min(320px, 80vw);
        height: 78px;
        padding: 12px 14px;
      }
      .ob-bar { width: 6px; }

      .hud-corner-text { font-size: 8px; letter-spacing: 0.12em; }
      .hud-corner-tl, .hud-corner-bl { left: 11%; }
      .hud-corner-tr, .hud-corner-br { right: 11%; }

    }

    @media (max-width: 480px) {
      .briefing-panel { width: min(360px, 94vw); }

      .hud-corner-text { font-size: 7px; }
      .briefing-line { font-size: 13px; }
      .briefing-line.active { font-size: 15px; }
    }
  </style>
</head>

  function buildCards(container, projects) {
    const maxCommits = Math.max(...PROJECTS.map(p => p.commits.length));
    let html = '';
    for (const proj of projects) {
      const n = proj.commits.length;
      const ratio = n / maxCommits;
      const glowLevel = (0.15 + ratio * 0.45).toFixed(2);
      const circumference = 2 * Math.PI * 16;
      const dashoffset = (circumference * (1 - ratio)).toFixed(1);
      const link = proj.url ? `<a href="${proj.url}" target="_blank">${proj.name}</a>` : proj.name;

      let commitsHtml = '';
      for (const c of proj.commits.slice(0, 3)) {
        commitsHtml += `<div class="proj-card-commit">
          <span class="pcc-date">${formatDate(c.date)}</span>
          <span class="pcc-msg">${c.msg}</span>
        </div>`;
      }

      html += `<div class="proj-card" style="--glow-level:${glowLevel}">
        <div class="proj-card-head">
          <div>
            <div class="proj-card-name">${link}</div>
            <div class="proj-card-tag">${proj.tag}</div>
          </div>
          <div class="commit-ring">
            <svg viewBox="0 0 36 36">
              <circle class="ring-bg" cx="18" cy="18" r="16"/>
              <circle class="ring-fill" cx="18" cy="18" r="16" style="stroke-dashoffset:${dashoffset}"/>
            </svg>
            <span class="ring-num">${n}</span>
          </div>
        </div>
        <div class="proj-card-commits">${commitsHtml}</div>
      </div>`;
    }
    container.innerHTML = html;
    setTimeout(() => {
      container.querySelectorAll('.ring-fill').forEach(el => {
        const target = el.style.strokeDashoffset;
        el.style.strokeDashoffset = '100.5';
        requestAnimationFrame(() => requestAnimationFrame(() => { el.style.strokeDashoffset = target; }));
      });
    }, 300);
  }

  function buildPanels() {
    buildCards(document.getElementById('primary-grid'), PROJECTS.filter(p => p.primary));
    buildCards(document.getElementById('other-grid'), PROJECTS.filter(p => !p.primary));
  }

  function animatePanels() {
    document.querySelectorAll('.panel-reveal').forEach((el, i) => {

  // ── AUTH ──
  async function hashCode(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // ── BRIEFING ENGINE ──
  // ── TTS: male voice only ──
  let jarvisVoice = null;
  let briefingSession = 0; // increments on every buildBriefing() so prior chains can abort

  function loadVoice() {
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    // 1) Honor user pick from voice-picker.html (localStorage.jarvis_voice)
    const picked = localStorage.getItem('jarvis_voice');
    if (picked) {
      const m = voices.find(v => v.name === picked);
      if (m && (!isMobile || m.localService)) { jarvisVoice = m; return; }
    }
    // 2) Default: male English; mobile prefers local voices to avoid silent remote-fetch failures
    const femaleNames = ['Samantha','Karen','Moira','Fiona','Victoria','Tessa','Allison','Ava','Susan','Kate','Serena','Kyoko','Yuna','Mei'];
    const enMale = voices.filter(v => v.lang.startsWith('en') && !femaleNames.some(f => v.name.includes(f)));
    const pool = isMobile ? enMale.filter(v => v.localService) : enMale;
    jarvisVoice = pool.find(v => v.name.includes('Daniel'))
      || pool.find(v => v.lang.startsWith('en-GB'))
      || pool[0]
      || enMale[0]
      || voices.find(v => v.lang.startsWith('en'))
      || voices[0]
      || null;
  }

  if (window.speechSynthesis) {
    speechSynthesis.onvoiceschanged = loadVoice;
    loadVoice();
  }

  // ── J.A.R.V.I.S. HUD: build perimeter tick marks dynamically ──
  (function buildHud() {
    const g = document.querySelector('.hud-ticks');
    if (!g) return;
    const NS = 'http://www.w3.org/2000/svg';
    for (let i = 0; i < 60; i++) {
      const a = (i * 6 - 90) * Math.PI / 180;
      const isMajor = i % 5 === 0;
      const r1 = isMajor ? 43.5 : 46.4;
      const r2 = 48;
      const x1 = (50 + Math.cos(a) * r1).toFixed(2);
      const y1 = (50 + Math.sin(a) * r1).toFixed(2);
      const x2 = (50 + Math.cos(a) * r2).toFixed(2);
      const y2 = (50 + Math.sin(a) * r2).toFixed(2);
      const line = document.createElementNS(NS, 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('stroke', isMajor ? 'rgba(0,235,255,0.78)' : 'rgba(0,200,255,0.32)');
      line.setAttribute('stroke-width', isMajor ? '0.3' : '0.13');
      line.setAttribute('stroke-linecap', 'round');
      g.appendChild(line);
    }
    // Cardinal labels (N, E, S, W)
    [['N',0],['E',90],['S',180],['W',270]].forEach(([t, deg]) => {
      const rad = (deg - 90) * Math.PI / 180;
      const x = (50 + Math.cos(rad) * 41).toFixed(2);
      const y = (50 + Math.sin(rad) * 41 + 0.6).toFixed(2);
      const text = document.createElementNS(NS, 'text');
      text.setAttribute('x', x);
      text.setAttribute('y', y);
      text.setAttribute('font-size', '1.9');
      text.setAttribute('fill', 'rgba(0,235,255,0.7)');
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('font-family', "'SF Mono', monospace");
      text.setAttribute('font-weight', '600');
      text.setAttribute('letter-spacing', '0.05');
      text.textContent = t;
      g.appendChild(text);
    });
    // Live signal-strength jitter for added realism
    const sig = document.getElementById('hud-sig');
    if (sig) {
      setInterval(() => {
        const v = 95 + Math.floor(Math.random() * 5);
        sig.textContent = v + '%';
      }, 1500);
    }
  })();

  // ── Audio analyser (Web Audio API) — silent synthetic source so AnalyserNode has data ──
  let audioCtx = null, analyser = null, freqData = null, gainNode = null;
  let muted = false;
  let captionsOn = true;

  function ensureAudio() {
    if (audioCtx) return;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = new Ctx();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 128;
      analyser.smoothingTimeConstant = 0.55;
      freqData = new Uint8Array(analyser.frequencyBinCount);

      // Pink-ish noise buffer
      const sr = audioCtx.sampleRate;
      const buf = audioCtx.createBuffer(1, sr * 2, sr);
      const ch = buf.getChannelData(0);
      let last = 0;
      for (let i = 0; i < ch.length; i++) {
        const w = Math.random() * 2 - 1;
        last = 0.97 * last + 0.03 * w;
        ch[i] = last * 3;
      }
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.loop = true;
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0;
      src.connect(gainNode).connect(analyser); // not connected to destination → silent
      src.start();
    } catch (e) { audioCtx = null; }
  }

  function setOrbState(state) {
    const orb = document.getElementById('jarvis-orb');
    if (!orb) return;
    orb.classList.remove('idle', 'listening', 'speaking');
    orb.classList.add(state);
    if (gainNode && audioCtx) {
      const t = state === 'speaking' ? 0.6 : state === 'listening' ? 0.3 : 0;
      try {
        gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(t, audioCtx.currentTime + 0.18);
      } catch (e) {}
    }
    if (state === 'speaking') startSyllablePulse(); else stopSyllablePulse();
  }

  // Syllable-rate gain driver — synthesizes natural speech rhythm so the orb
  // moves perceptibly with speech even when onboundary events are absent.
  let syllableTimer = null;
  let lastFlareAt = 0;
  function flarePulse() {
    const el = document.getElementById('orb-pulse');
    if (!el) return;
    el.classList.remove('flare');
    // restart animation
    void el.offsetWidth;
    el.classList.add('flare');
  }
  function startSyllablePulse() {
    if (!gainNode || !audioCtx || syllableTimer) return;
    const tick = () => {
      const orb = document.getElementById('jarvis-orb');
      if (!orb || !orb.classList.contains('speaking') || !gainNode || !audioCtx) {
        syllableTimer = null;
        return;
      }
      const peak  = 0.7 + Math.random() * 0.55;   // 0.70 – 1.25
      const valley = 0.25 + Math.random() * 0.2;  // 0.25 – 0.45
      const attack = 0.025 + Math.random() * 0.04;
      const decay  = 0.12 + Math.random() * 0.08;
      const t = audioCtx.currentTime;
      try {
        const g = gainNode.gain;
        g.cancelScheduledValues(t);
        g.setValueAtTime(Math.max(0.25, g.value), t);
        g.linearRampToValueAtTime(peak, t + attack);
        g.linearRampToValueAtTime(valley, t + attack + decay);
      } catch (_) {}
      // Trigger ripple flare on stronger syllables (~every 2nd–3rd)
      const now = performance.now();
      if (peak > 1.0 && now - lastFlareAt > 260) {
        flarePulse();
        lastFlareAt = now;
      }
      // Syllable cadence ~4.5–9 Hz (110–220 ms)
      syllableTimer = setTimeout(tick, 110 + Math.random() * 110);
    };
    tick();
  }
  function stopSyllablePulse() {
    if (syllableTimer) { clearTimeout(syllableTimer); syllableTimer = null; }
  }

  // 60fps render loop driving orb scale + frequency bars
  function renderOrb() {
    const core = document.querySelector('.orb-core');
    const bars = document.querySelectorAll('.ob-bar');
    if (!core || bars.length === 0) { requestAnimationFrame(renderOrb); return; }

    const orb = document.getElementById('jarvis-orb');
    const isSpeaking = orb && orb.classList.contains('speaking');
    let amplitude = 0;
    const N = bars.length;
    const bandValues = new Array(N).fill(0);

    if (isSpeaking) {
      if (analyser && freqData) {
        analyser.getByteFrequencyData(freqData);
        let sum = 0;
        for (let i = 0; i < freqData.length; i++) sum += freqData[i];
        amplitude = sum / (freqData.length * 255);
        const step = freqData.length / N;
        for (let i = 0; i < N; i++) {
          const a = Math.floor(i * step), b = Math.floor((i + 1) * step);
          let s = 0;
          for (let j = a; j < b; j++) s += freqData[j];
          bandValues[i] = (s / Math.max(1, b - a)) / 255;
        }
      } else {
        // Web Audio unavailable — synthesize pseudo-frequency dance.
        const t = performance.now() / 1000;
        amplitude = 0.55 + 0.25 * Math.abs(Math.sin(t * 5));
        for (let i = 0; i < N; i++) {
          bandValues[i] = 0.35 + 0.45 * Math.abs(Math.sin(t * (4.5 + i * 0.4) + i));
        }
      }
    } else {
      // Idle dim bars (core uses CSS breathing keyframes)
      const t = performance.now() / 1000;
      for (let i = 0; i < N; i++) {
        bandValues[i] = 0.05 + 0.03 * (0.5 + 0.5 * Math.sin(t * 0.8 + i * 0.7));
      }
    }

    if (isSpeaking) {
      // Punchier amplitude curve so syllables register visually.
      const a = Math.min(1, Math.pow(amplitude * 1.9, 0.85));
      // Anisotropic scale — vertical stretch like a vibrating membrane (mouth-like).
      const sx = 1 + a * 0.14;
      const sy = 1 + a * 0.28;
      const wobbleT = performance.now() / 1000;
      const dx = Math.sin(wobbleT * 7.3) * a * 1.6;
      const dy = Math.cos(wobbleT * 5.7) * a * 1.6;
      core.style.transform =
        `translate(${dx.toFixed(2)}px, ${dy.toFixed(2)}px) scale(${sx.toFixed(3)}, ${sy.toFixed(3)})`;
      core.style.boxShadow =
        `0 0 ${30 + a * 70}px rgba(0,210,255,${(0.45 + a * 0.45).toFixed(2)}),` +
        ` 0 0 ${50 + a * 80}px rgba(190,90,255,${(0.25 + a * 0.4).toFixed(2)}),` +
        ` 0 0 ${70 + a * 100}px rgba(255,90,180,${(0.15 + a * 0.3).toFixed(2)}),` +
        ` 0 0 ${4 + a * 14}px rgba(220,235,255,${(0.3 + a * 0.4).toFixed(2)}) inset`;
      core.style.filter =
        `brightness(${(1 + a * 0.22).toFixed(3)}) saturate(${(1.1 + a * 0.3).toFixed(3)}) hue-rotate(${(a * 12).toFixed(1)}deg)`;
    } else {
      // let CSS keyframes drive idle breathing
      core.style.transform = '';
      core.style.boxShadow = '';
      core.style.filter = '';
    }

    const maxBarH = barMaxHeight();
    for (let i = 0; i < N; i++) {
      // Boost mid bars (center of the row tends to be visually prominent).
      const center = (N - 1) / 2;
      const boost = 1 + 0.4 * (1 - Math.abs(i - center) / center);
      const v = Math.min(1, bandValues[i] * 1.6 * boost);
      bars[i].style.height = (6 + v * maxBarH).toFixed(1) + 'px';
      bars[i].style.opacity = (0.3 + v * 0.65).toFixed(2);
    }
    requestAnimationFrame(renderOrb);
  }

  // Cache soundbar inner height; refresh on resize so render loop avoids layout reads.
  let _maxBarH = 76;
  function barMaxHeight() { return _maxBarH; }
  function refreshBarHeight() {
    const c = document.getElementById('orb-bars');
    if (c) _maxBarH = Math.max(20, c.clientHeight - 28);
  }
  window.addEventListener('resize', refreshBarHeight);
  refreshBarHeight();
  requestAnimationFrame(renderOrb);

  function highlightRefs(ids) {
    if (!ids || !ids.length) return;
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.add('jarvis-highlight');
      setTimeout(() => el.classList.remove('jarvis-highlight'), 2400);
    });
  }

  function speak(text, opts) {
    opts = opts || {};
    ensureAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    setOrbState('speaking');
    const visualDuration = Math.max(1500, text.length * 55);
    const fallbackTimer = setTimeout(() => {
      if (!window.speechSynthesis || (!speechSynthesis.speaking && !speechSynthesis.pending)) {
        setOrbState('idle');
      }
    }, visualDuration);

    if (muted || !window.speechSynthesis || !jarvisVoice) {
      // No real audio path — still advance the chain so visuals don't deadlock.
      if (opts.onEnd) setTimeout(opts.onEnd, Math.max(1500, text.length * 55));
      return;
    }

    const utter = new SpeechSynthesisUtterance(text);
    utter.voice = jarvisVoice;
    utter.rate = 1.0;
    utter.pitch = 0.85;
    utter.volume = 0.8;
    utter.onboundary = (e) => {
      if (e.name !== 'word') return;
      // Gain pulse for orb visualization
      if (gainNode && audioCtx) {
        try {
          const g = gainNode.gain;
          g.cancelScheduledValues(audioCtx.currentTime);
          g.setValueAtTime(Math.max(0.4, g.value), audioCtx.currentTime);
          g.linearRampToValueAtTime(1.0, audioCtx.currentTime + 0.05);
          g.linearRampToValueAtTime(0.55, audioCtx.currentTime + 0.18);
        } catch (_) {}
      }
      // Word callback (count words up to this charIndex)
      if (opts.onWord) {
        const before = text.substring(0, e.charIndex);
        const wordIdx = (before.match(/\S+/g) || []).length;
        opts.onWord(wordIdx);
      }
    };
    utter.onend = () => {
      clearTimeout(fallbackTimer);
      if (opts.onEnd) opts.onEnd();
      setTimeout(() => {
        if (!speechSynthesis.speaking && !speechSynthesis.pending) setOrbState('idle');
      }, 220);
    };
    speechSynthesis.speak(utter);
  }

  // Wrap each word in <span class="bw"> while preserving inline formatting (bl-num, etc.)
  function wrapWords(html) {
    const wrap = document.createElement('div');
    wrap.innerHTML = html;
    const walk = (node) => {
      const kids = Array.from(node.childNodes);
      for (const child of kids) {
        if (child.nodeType === 3) {
          const txt = child.textContent;
          if (!txt) continue;
          const parts = txt.split(/(\s+)/);
          const frag = document.createDocumentFragment();
          for (const p of parts) {
            if (!p) continue;
            if (/^\s+$/.test(p)) {
              frag.appendChild(document.createTextNode(p));
            } else {
              const span = document.createElement('span');
              span.className = 'bw';
              span.textContent = p;
              frag.appendChild(span);
            }
          }
          child.parentNode.replaceChild(frag, child);
        } else if (child.nodeType === 1) {
          walk(child);
        }
      }
    };
    walk(wrap);
    return wrap.innerHTML;
  }

  function buildBriefing() {
    // Period
    const today = new Date();
    const weekAgo = new Date(today);
    weekAgo.setDate(weekAgo.getDate() - 7);
    document.getElementById('briefing-period').textContent =
      formatDate(weekAgo.toISOString().slice(0,10)) + ' — ' + formatDate(today.toISOString().slice(0,10));

    // Compute weekly stats
    const cutoff = new Date(today);
    cutoff.setDate(cutoff.getDate() - 7);
    const cutoffStr = cutoff.toISOString().slice(0, 10);

    let weekCommits = 0;
    let activeProjects = 0;
    const categories = { research: 0, teaching: 0, web: 0 };

    for (const proj of PROJECTS) {
      const recent = proj.commits.filter(c => c.date >= cutoffStr);
      if (recent.length > 0) {
        weekCommits += recent.length;
        activeProjects++;
        if (proj.primary) categories.research += recent.length;
        else if (proj.tag.includes('Teaching')) categories.teaching += recent.length;
        else categories.web += recent.length;
      }
    }

    const activeDays = new Set(
      PROJECTS.flatMap(p => p.commits.filter(c => c.date >= cutoffStr).map(c => c.date))
    ).size;

    // Build briefing lines
    const hour = today.getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';

    const lines = [
      { text: `${greeting}, Sir.`, speak: `${greeting}, Sir.` },
      {
        text: `This week: <span class="bl-num">${weekCommits}</span> commits, <span class="bl-num">${activeProjects}</span> active projects.`,
        speak: `This week: ${weekCommits} commits across ${activeProjects} active projects.`,
        refs: ['primary-grid', 'other-grid']
      },
      {
        text: `Claude tokens: <span class="bl-num">~38%</span> of weekly limit used.`,
        speak: `Claude tokens: approximately 38 percent of weekly limit used.`,
        refs: ['jarvis-stats']
      },
      { text: `Standing by, Sir.`, speak: `Standing by, Sir.` },
    ];

    // Build line elements with per-word spans
    const body = document.getElementById('briefing-body');
    body.innerHTML = '';
    const lineEls = lines.map((line) => {
      const div = document.createElement('div');
      div.className = 'briefing-line';
      div.innerHTML = wrapWords(line.text);
      body.appendChild(div);
      return { div, line, words: Array.from(div.querySelectorAll('.bw')) };
    });

    // Cancel any prior chain (e.g. user hit Replay mid-briefing) so audio + visuals stay in sync.
    briefingSession++;
    const session = briefingSession;
    if (window.speechSynthesis) { try { speechSynthesis.cancel(); } catch (_) {} }

    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    // Each line: speak → wait for onEnd (with fallback) → next line. Guarantees
    // audio order matches visual line order with no overlap.
    const processLine = (idx) => {
      if (session !== briefingSession) return;          // aborted by newer Replay
      if (idx >= lineEls.length) return;
      const { div, line, words } = lineEls[idx];

      for (let i = 0; i < idx; i++) {
        lineEls[i].div.classList.remove('active');
        lineEls[i].div.classList.add('past');
      }
      div.classList.add('visible', 'active');
      if (line.refs) highlightRefs(line.refs);

      const readTime = Math.max(1800, line.speak.length * 55);
      const perWord = readTime / Math.max(1, words.length);
      let lastBoundaryWord = -1;

      // Time-based word reveal (refined by onboundary if it fires).
      const wordTimers = words.map((w, i) =>
        setTimeout(() => {
          if (session !== briefingSession) return;
          if (!w.classList.contains('spoken')) {
            words.forEach(ww => ww.classList.remove('active'));
            w.classList.add('spoken', 'active');
            setTimeout(() => w.classList.remove('active'), 280);
          }
        }, 80 + i * perWord)
      );

      let advanced = false;
      const advance = () => {
        if (advanced || session !== briefingSession) return;
        advanced = true;
        wordTimers.forEach(clearTimeout);
        words.forEach(w => { w.classList.add('spoken'); w.classList.remove('active'); });
        clearTimeout(safetyTimer);
        setTimeout(() => processLine(idx + 1), 220);
      };

      // Hard cap: if onEnd never fires (no voice / muted / browser hiccup),
      // still move on so the chain can't deadlock.
      const safetyTimer = setTimeout(advance, readTime + 2000);

      speak(line.speak, {
        onWord: (wordIdx) => {
          if (session !== briefingSession) return;
          if (wordIdx <= lastBoundaryWord) return;
          lastBoundaryWord = wordIdx;
          if (words[wordIdx]) {
            words.forEach(ww => ww.classList.remove('active'));
            words[wordIdx].classList.add('spoken', 'active');
            setTimeout(() => {
              if (words[wordIdx]) words[wordIdx].classList.remove('active');
            }, 240);
          }
        },
        onEnd: advance,
      });
    };

    setTimeout(() => processLine(0), isMobile ? 80 : 600);
  }

  // Mute + captions controls (accessibility)
  document.getElementById('mute-btn').addEventListener('click', () => {
    muted = !muted;
    const btn = document.getElementById('mute-btn');
    btn.setAttribute('aria-pressed', String(muted));
    btn.querySelector('i').className = muted ? 'fas fa-volume-xmark' : 'fas fa-volume-high';
    if (muted && window.speechSynthesis) {
      speechSynthesis.cancel();
      setOrbState('idle');
    }
  });

  document.getElementById('replay-btn').addEventListener('click', () => {
    primeAudio(); // user gesture — re-arms the speech engine on iOS
    if (window.speechSynthesis) speechSynthesis.cancel();
    setOrbState('idle');
    setTimeout(buildBriefing, 250);
  });

  document.getElementById('cc-btn').addEventListener('click', () => {
    captionsOn = !captionsOn;
    const btn = document.getElementById('cc-btn');
    btn.setAttribute('aria-pressed', String(captionsOn));
    document.getElementById('briefing-body').style.display = captionsOn ? '' : 'none';
  });

  function initDashboard() {
    buildStats();
    buildPanels();
    animatePanels();
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    setTimeout(buildBriefing, isMobile ? 100 : 800);
  }

  function bootSequence() {
    const overlay = document.getElementById('boot-overlay');
    const dashboard = document.getElementById('dashboard');
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    document.getElementById('lock-screen').style.display = 'none';
    // Skip boot overlay on mobile so the first speak() fires within iOS's
    // gesture window (long boot animation drops the gesture).
    if (isMobile) {
      dashboard.style.display = 'block';
      requestAnimationFrame(() => { dashboard.classList.add('visible'); initDashboard(); });
      return;
    }
    overlay.style.display = 'flex';
    overlay.querySelectorAll('.boot-text').forEach(line => {
      setTimeout(() => line.classList.add('show'), +line.dataset.delay);
    });
    setTimeout(() => {
      overlay.style.display = 'none';
      dashboard.style.display = 'block';
      requestAnimationFrame(() => { dashboard.classList.add('visible'); initDashboard(); });
    }, 1800);
  }

  // ── Audio priming for mobile (iOS Safari requires gesture) ──
  let audioPrimed = false;
  function primeAudio() {
    if (audioPrimed) return;
    audioPrimed = true;
    ensureAudio();
    if (audioCtx && audioCtx.state === 'suspended') {
      try { audioCtx.resume(); } catch (_) {}
    }
    // Drain any leftover queue so the first briefing speak() lands cleanly.
    if (window.speechSynthesis) {
      try { speechSynthesis.cancel(); } catch (_) {}
    }
  }

  document.getElementById('lock-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    primeAudio(); // run inside user gesture before async work
    const input = document.getElementById('passcode');
    const h = await hashCode(input.value);
    if (h === HASH) {
      sessionStorage.setItem('dash_auth', '1');
      bootSequence();
    } else {
      input.classList.add('shake');
      input.value = '';
      setTimeout(() => input.classList.remove('shake'), 500);
    }
  });

  // Fallback: prime on first tap anywhere (covers session-restored loads with no unlock).
  document.addEventListener('pointerdown', primeAudio, { once: true, passive: true });

  if (sessionStorage.getItem('dash_auth') === '1') {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    // Mobile session-restore: defer the briefing until first tap so audio works.
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile && window.speechSynthesis) {
      const tapHint = document.createElement('div');
      tapHint.textContent = 'Tap to start';
      tapHint.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:14px 22px;background:rgba(0,200,255,0.12);border:1px solid rgba(0,200,255,0.45);border-radius:12px;color:#00e6ff;font-family:"SF Mono",monospace;letter-spacing:0.18em;text-transform:uppercase;font-size:12px;z-index:9999;backdrop-filter:blur(10px);';
      document.body.appendChild(tapHint);
      const start = () => {
        tapHint.remove();
        primeAudio();
        document.getElementById('dashboard').classList.add('visible');
        initDashboard();
      };
      document.addEventListener('pointerdown', start, { once: true });
    } else {
      requestAnimationFrame(() => { document.getElementById('dashboard').classList.add('visible'); initDashboard(); });
    }
  }

  function updateClock() {
    const el = document.getElementById('live-time');
    if (!el) return;
    const now = new Date();
    el.textContent = now.toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
